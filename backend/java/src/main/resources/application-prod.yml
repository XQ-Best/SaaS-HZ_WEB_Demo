server:
  port: 18080

crosshub:
  jwt-secret: ${CROSSHUB_JWT_SECRET:crosshub-prod-secret-change-me}
  db-path: ${CROSSHUB_DB_PATH:/data/crosshub/data/crosshub.db}
  crawler:
    python-executable: ${CROSSHUB_PYTHON:python3}
    script-dir: ${CROSSHUB_PYTHON_DIR:/data/crosshub/backend/python}
    timeout-seconds: 300
    allow-seed: false

spring:
  datasource:
    url: jdbc:sqlite:${crosshub.db-path}?busy_timeout=30000
    driver-class-name: org.sqlite.JDBC
    hikari:
      connection-init-sql: "PRAGMA busy_timeout=30000; PRAGMA journal_mode=WAL; PRAGMA synchronous=NORMAL;"
      maximum-pool-size: 8
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  jackson:
    property-naming-strategy: SNAKE_CASE
